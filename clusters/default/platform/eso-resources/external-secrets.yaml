apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: intikepri-static-webhook
  namespace: flux-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: intikepri-openbao
    kind: ClusterSecretStore
  target:
    name: intikepri-static-webhook
    deletionPolicy: Retain
  data:
    - secretKey: token
      remoteRef:
        key: kv/intikepri-static/webhook-token
        property: token
---
