apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: intikepri-minio
  namespace: intikepri-minio
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: intikepri-openbao
    kind: ClusterSecretStore
  target:
    name: intikepri-minio
    deletionPolicy: Retain
  data:
    - secretKey: rootUser
      remoteRef:
        key: kv/intikepri-cms/minio
        property: rootUser
    - secretKey: rootPassword
      remoteRef:
        key: kv/intikepri-cms/minio
        property: rootPassword
