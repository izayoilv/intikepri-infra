spec:
  refreshInterval: 1h
  secretStoreRef:
    name: intikepri-openbao
    kind: ClusterSecretStore
  target:
    name: intikepri-cms-webhook
    deletionPolicy: Retain
  data:
    - secretKey: token
      remoteRef:
        key: kv/intikepri-cms/webhook-token
        property: token
