apiVersion: v1
kind: LimitRange
metadata:
  name: intikepri-pod-limits
  namespace: intikepri-static
  labels:
    app.kubernetes.io/part-of: intikepri
    app.kubernetes.io/managed-by: flux
spec:
  limits:
    - default:
        cpu: "500m"
        memory: 512Mi
      defaultRequest:
        cpu: "100m"
        memory: 64Mi
      max:
        cpu: "1"
        memory: 1Gi
      type: Container
---
